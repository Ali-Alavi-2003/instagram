<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل کاربری | رئیس</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #fafafa; font-family: Tahoma, Arial, sans-serif; }
        .profile-container { max-width: 935px; margin: 30px auto; padding: 20px; }
        
        .profile-header { display: flex; align-items: center; margin-bottom: 40px; border-bottom: 1px solid #dbdbdb; padding-bottom: 40px; }
        .profile-image-container { flex: 1; display: flex; justify-content: center; }
        .profile-image { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 1px solid #dbdbdb; background-color: #eee; }
        .profile-info { flex: 2; }
        .username-row { display: flex; align-items: center; margin-bottom: 15px; gap: 20px; }
        
        /* استایل دکمه‌های کنترلی */
        .controls-row { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .username-row h2 { font-size: 28px; font-weight: 300; margin: 0; color: #262626; direction: ltr; }
        .btn-edit { background-color: transparent; border: 1px solid #dbdbdb; color: #262626; font-weight: 600; padding: 5px 12px; border-radius: 4px; font-size: 14px; text-decoration: none; }
        
        .stats-row { display: flex; margin-bottom: 20px; list-style: none; padding: 0; gap: 40px; }
        .stats-row li { font-size: 16px; }
        .stats-row li span { font-weight: 600; }
        .bio-row { font-size: 16px; line-height: 24px; font-weight: 400; color: #262626; }

        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .post-grid-item { position: relative; width: 100%; padding-top: 100%; overflow: hidden; background-color: #f0f0f0; border-radius: 4px; }
        .post-grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .post-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); color: #fff; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .post-grid-item:hover img { transform: scale(1.05); }
        .post-grid-item:hover .post-overlay { opacity: 1; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading-overlay"><div class="spinner-border text-primary" role="status"></div></div>

    <div class="container profile-container">
        <div class="profile-header">
            <div class="profile-image-container">
                <img id="profile-avatar" src="" alt="پروفایل" class="profile-image">
            </div>
            <div class="profile-info">
                <div class="username-row">
                    <h2 id="profile-username">Loading...</h2>
                </div>
                
                <!-- اضافه شدن دکمه‌های کنترل -->
                <div class="controls-row">
                    <a href="edit-profile.html" class="btn btn-outline-secondary btn-sm">ویرایش</a>
                    <button id="btn-toggle-privacy" class="btn btn-outline-primary btn-sm">
                        <i class="fas fa-lock" id="privacy-icon"></i> <span id="privacy-text">خصوصی‌سازی</span>
                    </button>
                    <button id="btn-logout" class="btn btn-outline-danger btn-sm">
                        <i class="fas fa-sign-out-alt"></i> خروج
                    </button>
                </div>

                <ul class="stats-row">
                    <li><span id="post-count">0</span> پست</li>
                    <li><span id="follower-count">0</span> دنبال‌کننده</li>
                    <li><span id="following-count">0</span> دنبال‌شونده</li>
                </ul>
                <div class="bio-row"><p id="profile-bio" style="white-space: pre-wrap;"></p></div>
            </div>
        </div>
        <div class="post-grid" id="post-grid"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const BASE_API = "http://localhost:8000";
        const FALLBACK_IMG = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='300'%3E%3Crect width='100%25' height='100%25' fill='%23eee'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23aaa' font-family='sans-serif'%3EImage Error%3C/text%3E%3C/svg%3E";
        
        // وضعیت حریم خصوصی در حافظه فرانت
        let isCurrentAccountPrivate = false;

        function getFullUrl(path) {
            if (!path) return FALLBACK_IMG;
            if (path.startsWith('http')) return path;
            return BASE_API + (path.startsWith('/') ? path : '/' + path);
        }

        async function fetchProfile() {
            const token = localStorage.getItem("access");
            if (!token) { window.location.href = "login.html"; return; }

            try {
                const response = await fetch(`${BASE_API}/accounts/profile/me/`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (response.status === 401) { window.location.href = "login.html"; return; }
                const data = await response.json();
                renderProfile(data);
            } catch (error) { console.error("Error:", error); } finally { $('#loading-overlay').fadeOut(); }
        }

        // پیدا کردن این بخش در کد خودت و جایگزین کردن با این:
        function renderProfile(data) {
            if (!data) return;
            
            // فیلدها ممکنه مستقیم باشن یا توی دیتای ارسالی از سمت سرور فرق کنن
            // طبق Swagger شما معمولاً user.username درسته
            const username = data.user?.username || data.username || data.phone_number;
            $('#profile-username').text(username);
            $('#profile-bio').text(data.bio || "بیوگرافی ندارد");
            $('#post-count').text(data.posts_count || 0);
            
            // اصلاح اصلی اینجاست: نمایش اعداد فالوور و فالووینگ
            $('#follower-count').text(data.followers_count || 0);
            $('#following-count').text(data.following_count || 0);
        
            if (data.avatar) {
                $('#profile-avatar').attr('src', getFullUrl(data.avatar));
            } else {
                $('#profile-avatar').attr('src', FALLBACK_IMG);
            }
            
            updatePrivacyButtonUI(data.is_private);
            renderPosts(data.posts || []);
        }


        // منطق دکمه خروج
        $('#btn-logout').on('click', function() {
            if (confirm("رئیس، مطمئنی می‌خوای خارج بشی؟")) {
                localStorage.removeItem('access');
                window.location.href = 'login.html';
            }
        });

        // منطق دکمه پرایوت
        $('#btn-toggle-privacy').on('click', async function() {
            const token = localStorage.getItem("access");
            const newState = !isCurrentAccountPrivate;
            try {
                const response = await fetch(`${BASE_API}/accounts/profile/me/`, {
                    method: 'PATCH',
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ is_private: newState })
                });
                if (response.ok) {
                    const data = await response.json();
                    updatePrivacyButtonUI(data.is_private);
                }
            } catch (error) { console.error("Error updating privacy:", error); }
        });

        function updatePrivacyButtonUI(isPrivate) {
            isCurrentAccountPrivate = isPrivate;
            const btn = $('#btn-toggle-privacy');
            const icon = $('#privacy-icon');
            const text = $('#privacy-text');
            if (isPrivate) {
                btn.removeClass('btn-outline-primary').addClass('btn-outline-success');
                icon.removeClass('fa-lock').addClass('fa-unlock');
                text.text('عمومی کردن');
            } else {
                btn.removeClass('btn-outline-success').addClass('btn-outline-primary');
                icon.removeClass('fa-unlock').addClass('fa-lock');
                text.text('خصوصی کردن');
            }
        }

        function renderPosts(posts) {
            const gridContainer = $('#post-grid').empty();
            if (!posts || posts.length === 0) { gridContainer.html('<div class="col-12 text-center text-muted py-5">پستی یافت نشد</div>'); return; }
            posts.forEach(post => {
                const url = post.img || post.image || post.file || FALLBACK_IMG;
                gridContainer.append(`<a href="post-detail.html?id=${post.id}" class="post-item-link"><div class="post-grid-item"><img src="${url}"><div class="post-overlay"><i class="fas fa-heart"></i> ${post.like_count || 0}</div></div></a>`);
            });
        }

        $(document).ready(fetchProfile);
    </script>
</body>
</html>
