<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پست‌های ذخیره شده | رئیس</title>
    <link rel="stylesheet" href="bootstrap-5.2.0-dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fafafa; font-family: Tahoma, sans-serif; }
        .nav-insta { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 0; position: sticky; top: 0; z-index: 1000; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-top: 30px; }
        .grid-item { position: relative; width: 100%; padding-bottom: 100%; overflow: hidden; background-color: #efefef; cursor: pointer; border-radius: 4px; }
        .grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s; }
        .grid-item:hover img { filter: brightness(0.8); }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0; transition: opacity 0.3s; font-weight: bold; }
        .grid-item:hover .grid-overlay { opacity: 1; }
        .header-saved { margin-top: 40px; border-top: 1px solid #dbdbdb; padding-top: 20px; text-align: center; }
        .header-saved i { font-size: 12px; margin-left: 5px; }
    </style>
</head>
<body>

    <nav class="nav-insta">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold" href="index.html">Instagram</a>
            <div class="search-box d-none d-md-block">
                <input type="text" class="form-control form-control-sm bg-light" placeholder="جستجو">
            </div>
            <div>
                <a href="index.html" class="text-dark me-3"><i class="fas fa-home fa-lg"></i></a>
                <a href="direct.html" class="text-dark me-3"><i class="fab fa-facebook-messenger fa-lg"></i></a>
                <a href="profile.html" class="text-dark"><i class="far fa-user-circle fa-lg"></i></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-saved">
            <h6 class="text-uppercase fw-bold"><i class="fas fa-bookmark"></i> پست‌های ذخیره شده</h6>
        </div>

        <div id="saved-posts-grid" class="grid-container">
            <!-- پست‌ها توسط JS لود می‌شوند -->
        </div>

        <div id="empty-msg" class="text-center d-none" style="margin-top: 100px; color: #8e8e8e;">
            <i class="far fa-bookmark fa-5x mb-3"></i>
            <h3>ذخیره</h3>
            <p>عکس‌ها و ویدیوهایی را که می‌خواهید دوباره ببینید ذخیره کنید. هیچ‌کس مطلع نخواهد شد.</p>
        </div>
    </div>

    <script src="jquery_3.5.1.min.js"></script>
    <script>
        const BASE_API = "http://127.0.0.1:8000";
        const token = localStorage.getItem("access");

        function loadSavedPosts() {
            if (!token) { window.location.href = "login.html"; return; }

            $.ajax({
                url: `${BASE_API}/posts/saved/`,
                method: 'GET',
                headers: { "Authorization": `Bearer ${token}` },
                success: function(data) {
                    const $grid = $('#saved-posts-grid').empty();
                    
                    if (data.length === 0) {
                        $('#empty-msg').removeClass('d-none');
                        return;
                    }

                    data.forEach(item => {
                        // چون در سریالایزر نوشتی post = PostSerializer()
                        const post = item.post; 
                        const imageUrl = post.image || 'default-post.jpg';
                        
                        const gridHtml = `
                            <div class="grid-item" onclick="location.href='post-detail.html?id=${post.id}'">
                                <img src="${imageUrl}" alt="Saved Post">
                                <div class="grid-overlay">
                                    <span class="me-3"><i class="fas fa-heart"></i> ${post.likes_count || 0}</span>
                                    <span><i class="fas fa-comment"></i> ${post.comments_count || 0}</span>
                                </div>
                            </div>
                        `;
                        $grid.append(gridHtml);
                    });
                },
                error: function(err) {
                    console.error("خطا در بارگذاری:", err);
                    if(err.status === 401) window.location.href = "login.html";
                }
            });
        }

        $(document).ready(function() {
            loadSavedPosts();
        });
    </script>
</body>
</html>
