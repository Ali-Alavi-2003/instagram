<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پروفایل کاربر - نسخه نهایی</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    body { background-color: #f8f9fa; font-family: Tahoma, sans-serif; }
    .profile-card { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #0d6efd; margin-bottom: 15px; background:#eef2ff; }
    .stats-box { background: #f1f3f5; border-radius: 10px; padding: 10px; margin: 20px 0; }
    .muted-small { color: #6c757d; font-size: 12px; }
    pre.api-log { direction:ltr; text-align:left; background:#0b1020; color:#ecf0f1; padding:12px; border-radius:10px; font-size:11px; max-height:200px; overflow:auto; }
  </style>
</head>
<body>

<div class="container">
  <div class="profile-card text-center">
    <img id="user-avatar" alt="Avatar" class="profile-avatar">
    <h2 id="user-username" class="fw-bold">در حال بارگذاری...</h2>
    <p id="user-bio" class="text-muted"></p>

    <div class="row stats-box">
      <div class="col-6 border-end">
        <div class="fw-bold" id="followers-count">0</div>
        <small class="text-muted">فالوور</small>
      </div>
      <div class="col-6">
        <div class="fw-bold" id="following-count">0</div>
        <small class="text-muted">فالووینگ</small>
      </div>
    </div>

    <div class="mt-4">
      <button id="follow-btn" class="btn btn-primary px-5 shadow-sm" style="display:none;">
        <span id="btn-text">...</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>
      <div id="follow-hint" class="muted-small mt-2"></div>
    </div>

    <div id="error-msg" class="alert alert-danger mt-3" style="display:none;"></div>
    
    <div class="mt-4 text-start" style="direction:ltr;">
      <div class="muted-small mb-1">Network Activity Log:</div>
      <pre id="api-log" class="api-log"></pre>
    </div>
  </div>
</div>

<script>
  const BASE_URL = "http://127.0.0.1:8000";
  const token = localStorage.getItem("access") || localStorage.getItem("token");
  const urlParams = new URLSearchParams(window.location.search);
  const targetUserId = parseInt(urlParams.get('id'));

  const apiLogEl = document.getElementById('api-log');
  const followBtn = document.getElementById('follow-btn');
  const followersCountEl = document.getElementById("followers-count");

  let state = { isFollowing: false, followRelationId: null };

  function log(msg) {
    const ts = new Date().toLocaleTimeString();
    apiLogEl.textContent += `[${ts}] ${msg}\n`;
    apiLogEl.scrollTop = apiLogEl.scrollHeight;
  }

  const getHeaders = () => {
    const h = { "Content-Type": "application/json" };
    if (token) h["Authorization"] = `Bearer ${token}`;
    return h;
  };

  const FALLBACK_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' fill='%23ccc'><circle cx='60' cy='60' r='60'/></svg>";

  // --- Core Functions ---

  async function call(url, method = "GET", body = null) {
    try {
      log(`${method} ${url}`);
      const res = await fetch(url, { method, headers: getHeaders(), body: body ? JSON.stringify(body) : null });
      const text = await res.text();
      let data = null;
      try { data = JSON.parse(text); } catch(e) {}
      return { ok: res.ok, status: res.status, data };
    } catch (e) {
      log(`Network Error: ${e.message}`);
      return { ok: false };
    }
  }

  function render(p) {
    // Normalizing data from different endpoints
    const username = p.username || p.user?.username || p.phone_number || "کاربر ناشناس";
    const bio = p.bio || p.user?.bio || "بدون بیوگرافی";
    const avatar = p.avatar || p.user?.avatar;
    
    document.getElementById("user-username").textContent = username;
    document.getElementById("user-bio").textContent = bio;
    document.getElementById("user-avatar").src = avatar ? (avatar.startsWith('http') ? avatar : BASE_URL + avatar) : FALLBACK_AVATAR;
    
    document.getElementById("followers-count").textContent = p.followers_count ?? 0;
    document.getElementById("following-count").textContent = p.following_count ?? 0;
  }

  async function loadProfile() {
    if (!targetUserId) {
      document.getElementById("error-msg").textContent = "آیدی کاربر مشخص نیست (id=?)";
      document.getElementById("error-msg").style.display = "block";
      return;
    }

    // مرحله ۱: تلاش برای گرفتن پروفایل خاص (اینجا ممکنه بک‌اِند اشتباهاً پروفایل خودت رو بده)
    let r = await call(`${BASE_URL}/accounts/profile/?id=${targetUserId}`);
    
    let found = null;
    if (r.ok && r.data) {
      const list = Array.isArray(r.data) ? r.data : (r.data.results || [r.data]);
      // سخت‌گیری: چک کن حتماً آیدی همونی باشه که می‌خوایم
      found = list.find(u => (u.id === targetUserId || u.user?.id === targetUserId));
    }

    // مرحله ۲: اگه مرحله ۱ شکست خورد یا دیتای اشتباه داد، از لیست کل پروفایل‌ها بگرد
    if (!found) {
      log("Strict check failed. Searching in all profiles...");
      let rAll = await call(`${BASE_URL}/accounts/all-profiles/`);
      if (rAll.ok && rAll.data) {
        const list = Array.isArray(rAll.data) ? rAll.data : (rAll.data.results || []);
        found = list.find(u => (u.id === targetUserId || u.user?.id === targetUserId));
      }
    }

    if (found) {
      render(found);
      initFollowStatus();
    } else {
      document.getElementById("error-msg").textContent = `خطا: پروفایل با آیدی ${targetUserId} یافت نشد.`;
      document.getElementById("error-msg").style.display = "block";
      document.getElementById("user-username").textContent = "یافت نشد";
    }
  }

  async function initFollowStatus() {
    if (!token) return;
    const r = await call(`${BASE_URL}/follows/follows/followings/`);
    if (r.ok && Array.isArray(r.data)) {
      const match = r.data.find(f => (f.following === targetUserId || f.following?.id === targetUserId));
      state.isFollowing = !!match;
      state.followRelationId = match ? (match.id || match.pk) : null;
      updateFollowUI();
    }
  }

  function updateFollowUI() {
    followBtn.style.display = "inline-block";
    const btnText = document.getElementById('btn-text');
    if (state.isFollowing) {
      btnText.textContent = "آنفالو";
      followBtn.className = "btn btn-outline-danger px-5 shadow-sm";
    } else {
      btnText.textContent = "فالو";
      followBtn.className = "btn btn-primary px-5 shadow-sm";
    }
  }

  followBtn.addEventListener('click', async () => {
    followBtn.disabled = true;
    document.getElementById('btn-spinner').classList.remove('d-none');
    
    if (state.isFollowing) {
      const r = await call(`${BASE_URL}/follows/follows/${state.followRelationId}/`, "DELETE");
      if (r.status === 204 || r.ok) {
        state.isFollowing = false;
        state.followRelationId = null;
        followersCountEl.textContent = parseInt(followersCountEl.textContent) - 1;
      }
    } else {
      const r = await call(`${BASE_URL}/follows/follows/`, "POST", { following: targetUserId });
      if (r.ok) {
        state.isFollowing = true;
        state.followRelationId = r.data.id;
        followersCountEl.textContent = parseInt(followersCountEl.textContent) + 1;
      }
    }
    
    updateFollowUI();
    followBtn.disabled = false;
    document.getElementById('btn-spinner').classList.add('d-none');
  });

  loadProfile();
</script>
</body>
</html>
